<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/nerd.ico" type="image/x-icon"> <!--Assim faz o iconezinho da página na aba, acha o icone proporção 1:1 e pesquisa favicon na barra de busca, depois extrai da pasta zip o arquivo .ico-->
    <title>Teste com imagens</title>
</head>
<body>
    <h1>Testando carga com imagens:</h1>
    <p>Abaixo você vai ver uma imagem que está na mesma pasta.</p>
    <img src="html-200.png" alt="Logo HTML5">
    <p>Podemos também carregar imagens que estão em sub-pastas.</p>
    <img src="imagens/css-200.png" alt="Logo CSS3">
    <p>Também podemos carregar imagens externas.</p>
    <img src="https://cdn.iconscout.com/icon/free/png-256/free-javascript-3629449-3031512.png" alt="Logo JavaScript" width="200" height="200"> <!--Width é a largura da imagem. Height, a altura-->
</body>
</html>
