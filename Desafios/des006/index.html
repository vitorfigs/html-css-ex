<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá ser utilizada para cada caso.</p>
    <ul type="square">
        <li title="Use a tag &lt;h1&gt;...&lt;h6&lt;">Títulos</li>
        <li title="Use a tag &lt;p&gt;">Parágrafos</li>
        <li title="Use a tag &lt;img&gt;">Imagens</li>
        <li title="Use a tag &lt;abbr&gt;">Abreviações</li>
        <li title="Use a tag &lt;code&gt;">Códigos-fonte</li>
        <li title="Use as tags &lt;ol&gt; e &lt;il&gt;">Listas numeradas</li>
        <li title="Use as tags &lt;ul&gt; e &lt;il&gt;">Listas com demarcadores</li>
    </ul>
</body>
</html>
